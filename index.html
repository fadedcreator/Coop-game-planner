<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-op Game Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Controller 1 — upper-left, tilted CCW, faded -->
          <g transform="rotate(-22, 6.5, 7.5)" opacity="0.4">
            <rect x="1.5" y="4.5" width="10" height="6" rx="3" fill="white"/>
            <rect x="3.2" y="7.1" width="1.8" height="0.65" rx="0.28" fill="#818cf8"/>
            <rect x="3.78" y="6.52" width="0.65" height="1.8" rx="0.28" fill="#818cf8"/>
            <circle cx="9.6" cy="6.9" r="0.62" fill="#818cf8"/>
            <circle cx="10.7" cy="8.0" r="0.62" fill="#818cf8"/>
          </g>
          <!-- Controller 2 — lower-right, tilted CW, full opacity -->
          <g transform="rotate(22, 13.5, 12.5)">
            <rect x="8.5" y="9.5" width="10" height="6" rx="3" fill="white"/>
            <rect x="10.2" y="12.1" width="1.8" height="0.65" rx="0.28" fill="#6366f1"/>
            <rect x="10.78" y="11.52" width="0.65" height="1.8" rx="0.28" fill="#6366f1"/>
            <circle cx="17.1" cy="11.4" r="0.62" fill="#6366f1"/>
            <circle cx="18.2" cy="12.5" r="0.62" fill="#6366f1"/>
          </g>
        </svg>
      </div>
      <span class="logo-text">Co-op Game Planner</span>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" id="btn-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span class="btn-label">Browse Library</span>
      </button>
      <button class="btn-pick" id="btn-pick">
        🎲 <span class="btn-label">Pick Tonight</span>
      </button>
      <button class="btn-primary" id="btn-add">
        Add Custom Game
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════
       FILTER + SORT BAR (single row)
  ══════════════════════════════════════════════════════════ -->
  <div class="filter-bar">
    <div class="filter-pills" role="group" aria-label="Filter by status">
      <button class="filter-pill active" data-filter="all">
        All <span class="pill-count" id="count-all">0</span>
      </button>
      <button class="filter-pill" data-filter="Want to Play">
        Want to Play <span class="pill-count" id="count-want">0</span>
      </button>
      <button class="filter-pill" data-filter="Playing">
        Playing <span class="pill-count" id="count-playing">0</span>
      </button>
      <button class="filter-pill" data-filter="Finished">
        Finished <span class="pill-count" id="count-finished">0</span>
      </button>
    </div>

    <div class="bar-divider" aria-hidden="true"></div>

    <div class="sort-pills" role="group" aria-label="Sort by">
      <button class="sort-pill active" data-sort="date">Date Added</button>
      <button class="sort-pill" data-sort="az">A–Z</button>
      <button class="sort-pill" data-sort="status">Status</button>
      <button class="sort-pill" data-sort="rating">Rating</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       GAME GRID
  ══════════════════════════════════════════════════════════ -->
  <main class="game-grid" id="game-grid" aria-label="Game library"></main>

  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🕹️</div>
    <h3>No games here</h3>
    <p id="empty-sub">Add a game or change your filter</p>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL — ADD / EDIT
  ══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-add" role="dialog" aria-modal="true" aria-labelledby="modal-add-heading">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-add-heading">Add Custom Game</h2>
        <button class="modal-close" data-close="modal-add" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit-game-id" />

        <div class="form-group">
          <label for="game-title">Game Title <span class="req">*</span></label>
          <input type="text" id="game-title" placeholder="Enter game title…" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="game-platform">Platform</label>
          <div class="select-wrap">
            <select id="game-platform">
              <option value="">Select platform…</option>
              <option>PC</option>
              <option>PlayStation 5</option>
              <option>PlayStation 4</option>
              <option>Xbox Series X/S</option>
              <option>Xbox One</option>
              <option>Nintendo Switch</option>
              <option>Mobile</option>
              <option>Other</option>
            </select>
            <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>

        <div class="form-group">
          <label>Status</label>
          <div class="status-toggle" id="add-status-toggle">
            <button class="status-opt active" data-status="Want to Play">Want to Play</button>
            <button class="status-opt" data-status="Playing">Playing</button>
            <button class="status-opt" data-status="Finished">Finished</button>
          </div>
        </div>

        <div class="form-group">
          <label>Rating <span class="opt">(optional)</span></label>
          <div class="star-input" id="add-star-input" data-rating="0">
            <span class="star-btn" data-val="1">★</span>
            <span class="star-btn" data-val="2">★</span>
            <span class="star-btn" data-val="3">★</span>
            <span class="star-btn" data-val="4">★</span>
            <span class="star-btn" data-val="5">★</span>
            <span class="star-clear" id="star-clear-btn">Clear</span>
          </div>
        </div>

        <div class="form-group">
          <label>Cover Image <span class="opt">(optional)</span></label>
          <div class="cover-upload-row">
            <label class="cover-upload-btn" for="cover-file-input">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload file
            </label>
            <input type="file" id="cover-file-input" accept="image/jpeg,image/png,image/webp" />
            <span class="cover-upload-hint">or auto-fetched from Steam by title</span>
          </div>
          <div class="cover-auto-area" id="cover-auto-area">
            <div class="cover-auto-found" id="cover-auto-found" style="display:none">
              <img class="cover-auto-img" id="cover-auto-img" src="" alt="" />
              <button type="button" class="btn-ghost btn-sm" id="btn-clear-cover">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" data-close="modal-add">Cancel</button>
        <button class="btn-primary" id="btn-save-game">Save Game</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL — GAME DETAIL
  ══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-detail" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="modal-container modal-detail-container">
      <button class="modal-close detail-close" data-close="modal-detail" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <div class="detail-layout">
        <div class="detail-cover-wrap">
          <img class="detail-cover-img" id="detail-img" src="" alt="" />
          <div class="detail-cover-fallback" id="detail-fallback"></div>
        </div>
        <div class="detail-info">
          <h2 class="detail-title" id="detail-title"></h2>
          <div class="detail-meta">
            <span class="detail-platform-badge" id="detail-platform"></span>
            <span class="detail-status-badge" id="detail-status-badge"></span>
          </div>
          <div class="detail-stars" id="detail-stars"></div>
          <div class="detail-actions">
            <button class="btn-ghost" id="btn-detail-edit">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn-ghost" id="btn-detail-delete">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
              Remove
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL — PICK TONIGHT
  ══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-pick" role="dialog" aria-modal="true" aria-labelledby="pick-heading">
    <div class="modal-container modal-pick-container">
      <div class="modal-header">
        <h2 class="modal-title" id="pick-heading">🎲 Tonight's Pick</h2>
        <button class="modal-close" data-close="modal-pick" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Normal pick state -->
      <div id="pick-body">
        <div class="pick-cover-wrap">
          <img class="pick-cover-img" id="pick-img" src="" alt="" />
          <div class="pick-cover-fallback" id="pick-fallback">🎮</div>
        </div>
        <div class="pick-info">
          <h3 class="pick-title" id="pick-title"></h3>
        </div>
        <div class="modal-footer pick-footer">
          <button class="btn-ghost" id="btn-pick-again">🎲 Pick Again</button>
          <button class="btn-primary" data-close="modal-pick">Let's Play!</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="pick-empty" class="pick-empty-state">
        <div class="empty-icon" style="font-size:40px;margin-bottom:12px">🤔</div>
        <p>No games in your <strong>Want to Play</strong> list.</p>
        <p style="margin-top:6px;font-size:13px;color:var(--text-3)">Add some games to get a pick!</p>
        <button class="btn-ghost" style="margin-top:18px" data-close="modal-pick">Got it</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL — BROWSE CATALOG
  ══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-search" role="dialog" aria-modal="true" aria-labelledby="search-heading">
    <div class="modal-container modal-search-container">
      <div class="modal-header">
        <h2 class="modal-title" id="search-heading">Browse Library</h2>
        <button class="modal-close" data-close="modal-search" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="catalog-search-row">
        <input type="text" id="catalog-search" placeholder="Filter games…" autocomplete="off" />
      </div>

      <div class="catalog-genre-row" role="group" aria-label="Filter by genre">
        <button class="catalog-genre-pill active" data-genre="all">All</button>
        <button class="catalog-genre-pill" data-genre="Action">Action</button>
        <button class="catalog-genre-pill" data-genre="RPG">RPG</button>
        <button class="catalog-genre-pill" data-genre="Survival">Survival</button>
        <button class="catalog-genre-pill" data-genre="Puzzle">Puzzle</button>
        <button class="catalog-genre-pill" data-genre="Party">Party</button>
        <button class="catalog-genre-pill" data-genre="Shooter">Shooter</button>
        <button class="catalog-genre-pill" data-genre="Horror">Horror</button>
        <button class="catalog-genre-pill" data-genre="Strategy">Strategy</button>
      </div>

      <div class="catalog-grid" id="catalog-grid"></div>
    </div>
  </div>


  <script src="app.js"></script>
</body>
</html>
